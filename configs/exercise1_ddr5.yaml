Frontend:
  impl: SimpleO3
  clock_ratio: 8
  num_expected_insts: 100000
  traces: 
    - lab/traces/sequential.trace

  Translation:
    impl: RandomTranslation
    max_addr: 2147483648
              

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3

  DRAM:
    impl: DDR5
    org:
      preset: DDR5_8Gb_x8
      channel: 1
      rank: 2
    timing:
      preset: DDR5_3200C
    RFM:
      BRC: 2

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 4
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh